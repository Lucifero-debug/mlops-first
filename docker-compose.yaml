version: "3"
services:
  airflow:
    build:
      context: ./
      dockerfile: Dockerfile.airflow
    image: airflowimage
    container_name: gemstone-prediction-airflow
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dataset:/opt/airflow/dataset
      - ./src:/opt/airflow/src
    
  flaskapp:
    build:
      context: ./
      dockerfile: Dockerfile.flask
    image: flaskimage
    container_name: gemstone-prediction-flask
    ports:
      - "80:80"
  
  mlflow:
    build:
      context: ./
      dockerfile: Dockerfile.mlflow
    image: mlflowimage
    container_name: gemstone-prediction-mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/app/mlruns
    